<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLA | Connexion</title>
    <meta name="description" content="Connexion a LLA pour retrouver vos preferences, votre progression et vos exercices.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#ff6b3d">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="fr_FR">
    <meta property="og:title" content="LLA | Connexion">
    <meta property="og:description" content="Connecte-toi a LLA pour retrouver ta progression, tes preferences et tes exercices.">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body class="auth-page">
    <a href="#main-content" class="skip-link">Aller au contenu principal</a>
    <div class="site-glow glow-a"></div>
    <div class="site-glow glow-b"></div>

    <main id="main-content">
        <div class="auth-container auth-login-layout">
            <section class="auth-card panel auth-login-card">
                <a href="index.html" class="btn btn-ghost auth-back-link" aria-label="Retour a l'accueil" title="Accueil">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M4.75 10.25L12 4.5l7.25 5.75" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                        <path d="M7 9.75V19.25h10V9.75" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                        <path d="M10.2 19.25V14.7a1.8 1.8 0 0 1 1.8-1.8h0a1.8 1.8 0 0 1 1.8 1.8v4.55" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </a>
                <div class="auth-header">
                    <p class="section-subtitle">Acces membre</p>
                    <h1>LLA</h1>
                </div>

                <div class="auth-switch" role="tablist" aria-label="Connexion ou inscription">
                    <button id="loginTabBtn" type="button" class="auth-switch-btn active" role="tab" aria-selected="true">Connexion</button>
                    <button id="registerTabBtn" type="button" class="auth-switch-btn" role="tab" aria-selected="false">Inscription</button>
                </div>

                <form id="loginForm" class="auth-form auth-panel" novalidate>
                    <div id="loginMessage" class="auth-message error-message" role="alert" aria-live="polite" hidden></div>

                    <div class="form-group">
                        <label for="email">Adresse email</label>
                        <input type="email" id="email" name="email" placeholder="vous@exemple.com" autocomplete="email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" name="password" placeholder="Entrez votre mot de passe" autocomplete="current-password" required>
                    </div>

                    <button type="submit" id="loginButton" class="btn btn-primary auth-btn">Se connecter</button>
                </form>

                <form id="registerInlineForm" class="auth-form auth-panel" hidden novalidate>
                    <div id="registerMessage" class="auth-message error-message" role="alert" aria-live="polite" hidden></div>

                    <div class="form-group">
                        <label for="registerUsername">Nom d'utilisateur</label>
                        <input type="text" id="registerUsername" name="username" placeholder="johndoe" minlength="3" required>
                    </div>

                    <div class="form-group">
                        <label for="registerEmail">Adresse email</label>
                        <input type="email" id="registerEmail" name="email" placeholder="vous@exemple.com" autocomplete="email" required>
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">Mot de passe</label>
                        <input type="password" id="registerPassword" name="password" placeholder="Minimum 6 caracteres" minlength="6" required>
                    </div>

                    <div class="form-group">
                        <label for="registerConfirmPassword">Confirmer le mot de passe</label>
                        <input type="password" id="registerConfirmPassword" name="confirmPassword" placeholder="Confirmer le mot de passe" minlength="6" required>
                    </div>

                    <button type="submit" id="registerButton" class="btn btn-primary auth-btn">Creer un compte</button>
                </form>

                <div class="auth-footer">
                    <p>Pas encore de compte ? <button type="button" id="switchToRegisterBtn" class="auth-footer-toggle">Inscris-toi ici</button></p>
                    <p>Deja inscrit ? <button type="button" id="switchToLoginBtn" class="auth-footer-toggle">Retour a la connexion</button></p>
                </div>
            </section>

        </div>
    </main>

    <script src="assets/js/api.js"></script>
    <script>
        (function applyStoredPreferences() {
            const root = document.documentElement;
            const body = document.body;
            const SETTINGS_KEY = "lla-settings";
            const defaultSettings = {
                accent: "sunset",
                theme: "light",
                motion: true
            };
            const accentPalette = {
                sunset: { accent: "#ff6b3d", accent2: "#ff9f1c", soft: "rgba(255, 107, 61, 0.18)" },
                ocean: { accent: "#1f7fff", accent2: "#00b4d8", soft: "rgba(31, 127, 255, 0.2)" },
                mint: { accent: "#14b884", accent2: "#9ad84b", soft: "rgba(20, 184, 132, 0.2)" }
            };

            let settings = defaultSettings;

            try {
                const storedSettings = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}");
                settings = { ...defaultSettings, ...storedSettings };
            } catch (error) {
                settings = defaultSettings;
            }

            const palette = accentPalette[settings.accent] || accentPalette.sunset;
            root.style.setProperty("--accent", palette.accent);
            root.style.setProperty("--accent-2", palette.accent2);
            root.style.setProperty("--accent-soft", palette.soft);

            const accentMatch = palette.accent.match(/\w\w/g) || [];
            if (accentMatch.length === 3) {
                root.style.setProperty("--accent-rgb", accentMatch.map((value) => parseInt(value, 16)).join(", "));
            }

            body.classList.toggle("theme-night", settings.theme === "night");
            body.classList.toggle("motion-off", !settings.motion);
        })();

        const loginTabBtn = document.getElementById("loginTabBtn");
        const registerTabBtn = document.getElementById("registerTabBtn");
        const switchToRegisterBtn = document.getElementById("switchToRegisterBtn");
        const switchToLoginBtn = document.getElementById("switchToLoginBtn");
        const loginForm = document.getElementById("loginForm");
        const registerForm = document.getElementById("registerInlineForm");
        const loginMessage = document.getElementById("loginMessage");
        const registerMessage = document.getElementById("registerMessage");
        const loginButton = document.getElementById("loginButton");
        const registerButton = document.getElementById("registerButton");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const registerUsernameInput = document.getElementById("registerUsername");
        const registerEmailInput = document.getElementById("registerEmail");
        const registerPasswordInput = document.getElementById("registerPassword");
        const registerConfirmPasswordInput = document.getElementById("registerConfirmPassword");

        function setActiveMode(mode) {
            const isLoginMode = mode === "login";
            loginForm.hidden = !isLoginMode;
            registerForm.hidden = isLoginMode;

            loginTabBtn.classList.toggle("active", isLoginMode);
            loginTabBtn.setAttribute("aria-selected", String(isLoginMode));
            registerTabBtn.classList.toggle("active", !isLoginMode);
            registerTabBtn.setAttribute("aria-selected", String(!isLoginMode));
        }

        function showMessage(node, message, type) {
            node.textContent = message;
            node.classList.toggle("success-message", type === "success");
            node.classList.toggle("error-message", type !== "success");
            node.hidden = false;
        }

        function clearMessage(node) {
            node.hidden = true;
            node.textContent = "";
            node.classList.remove("success-message");
            node.classList.remove("error-message");
        }

        function writeSession(token, user) {
            const normalizedUser = {
                id: user.id || user.user_id || null,
                user_id: user.user_id || user.id || null,
                username: user.username || "",
                email: user.email || "",
                level: user.level || "beginner",
                role: user.role || (user.is_admin ? "admin" : "user"),
                is_admin: Boolean(user.is_admin)
            };

            if (typeof token === "string" && token.trim()) {
                localStorage.setItem("auth_token", token);
            } else {
                localStorage.removeItem("auth_token");
            }

            localStorage.setItem("user_info", JSON.stringify(normalizedUser));
        }

        loginTabBtn.addEventListener("click", function () {
            setActiveMode("login");
        });

        registerTabBtn.addEventListener("click", function () {
            setActiveMode("register");
        });

        if (switchToRegisterBtn) {
            switchToRegisterBtn.addEventListener("click", function () {
                setActiveMode("register");
            });
        }

        if (switchToLoginBtn) {
            switchToLoginBtn.addEventListener("click", function () {
                setActiveMode("login");
            });
        }

        setActiveMode("login");

        loginForm.addEventListener("submit", async function (event) {
            event.preventDefault();
            clearMessage(loginMessage);

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showMessage(loginMessage, "Veuillez remplir votre email et votre mot de passe.");
                return;
            }

            loginButton.disabled = true;
            loginButton.textContent = "Connexion...";

            try {
                const apiResult = await apiLogin(email, password);
                if (apiResult && apiResult.success && apiResult.data) {
                    writeSession(apiResult.data.token, apiResult.data.user || {});
                    const user = apiResult.data.user || {};
                    const isAdmin = user.is_admin === true || user.role === "admin" || user.level === "admin";
                    window.location.href = isAdmin ? "../../admin/dashboard.html" : "problems.html";
                    return;
                }

                const apiError = apiResult && (apiResult.message || apiResult.errors);
                showMessage(loginMessage, String(apiError || "Identifiants invalides."));
                passwordInput.value = "";
                passwordInput.focus();
            } catch (error) {
                showMessage(loginMessage, "Impossible de contacter le serveur de connexion.");
            } finally {
                loginButton.disabled = false;
                loginButton.textContent = "Se connecter";
            }
        });

        registerForm.addEventListener("submit", async function (event) {
            event.preventDefault();
            clearMessage(registerMessage);

            const username = registerUsernameInput.value.trim();
            const email = registerEmailInput.value.trim();
            const password = registerPasswordInput.value;
            const confirmPassword = registerConfirmPasswordInput.value;

            if (!username || !email || !password || !confirmPassword) {
                showMessage(registerMessage, "Veuillez remplir tous les champs.");
                return;
            }

            if (password.length < 6) {
                showMessage(registerMessage, "Le mot de passe doit contenir au moins 6 caracteres.");
                return;
            }

            if (password !== confirmPassword) {
                showMessage(registerMessage, "Les mots de passe ne correspondent pas.");
                return;
            }

            registerButton.disabled = true;
            registerButton.textContent = "Creation...";

            try {
                const result = await apiRegister(username, email, password);
                if (result && result.success && result.data) {
                    writeSession(result.data.token, result.data.user || { username, email });
                    showMessage(registerMessage, "Compte cree. Redirection...", "success");
                    window.setTimeout(function () {
                        window.location.href = "problems.html";
                    }, 320);
                    return;
                }

                showMessage(registerMessage, String((result && (result.message || result.errors)) || "Impossible de creer le compte."));
            } catch (error) {
                showMessage(registerMessage, "Impossible de creer le compte pour le moment.");
            } finally {
                registerButton.disabled = false;
                registerButton.textContent = "Creer un compte";
            }
        });
    </script>
</body>

</html>
