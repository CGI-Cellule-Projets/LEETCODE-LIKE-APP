<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoForge Admin | Gestion des Problèmes</title>
    <meta name="description" content="Gérez les problèmes de codage sur AlgoForge.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body class="admin-page">
    <div class="site-glow glow-a"></div>
    <div class="site-glow glow-b"></div>

    <!-- ================= ADMIN NAVBAR ================= -->
    <header class="admin-topbar">
        <div class="container admin-topbar-inner">
            <a class="brand" href="dashboard.html"><span>Algo</span>Forge <span class="badge">Admin</span></a>
            <nav class="admin-nav">
                <a class="admin-nav-link" href="dashboard.html">Tableau de Bord</a>
                <a class="admin-nav-link active" href="problems.html">Problèmes</a>
                <a class="admin-nav-link" href="users.html">Utilisateurs</a>
            </nav>
            <div class="admin-actions">
                <div class="user-info">
                    <span id="adminUsername">Admin</span>
                    <button id="logoutBtn" class="btn btn-ghost btn-sm">Déconnecter</button>
                </div>
            </div>
        </div>
    </header>

    <main class="admin-main">
        <section class="admin-container">
            <div class="admin-header">
                <h1>Gestion des Problèmes</h1>
                <p>Créez, modifiez et supprimez des problèmes de codage</p>
                <button id="createProblemBtn" class="btn btn-primary">+ Créer un Problème</button>
            </div>

            <!-- ================= CREATE/EDIT FORM ================= -->
            <div id="createFormSection" class="problem-form-section panel" style="display: none;">
                <h2 id="formTitle">Créer un Nouveau Problème</h2>
                <form id="problemForm" class="problem-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="problemName">Nom du Problème *</label>
                            <input type="text" id="problemName" placeholder="Ex: Two Sum" required>
                        </div>
                        <div class="form-group">
                            <label for="problemDifficulty">Difficulté *</label>
                            <select id="problemDifficulty" required>
                                <option value="">Sélectionner une difficulté</option>
                                <option value="easy">Facile</option>
                                <option value="medium">Moyen</option>
                                <option value="hard">Difficile</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="problemDescription">Description *</label>
                        <textarea id="problemDescription" placeholder="Décrivez le problème..." required rows="6"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="problemCategory">Catégorie</label>
                            <input type="text" id="problemCategory" placeholder="Ex: Array, HashMap">
                        </div>
                        <div class="form-group">
                            <label for="isPublished">
                                <input type="checkbox" id="isPublished">
                                Publié
                            </label>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Enregistrer</button>
                        <button type="button" class="btn btn-ghost" id="cancelFormBtn">Annuler</button>
                    </div>
                </form>

                <div id="formError" class="error-message" style="display: none;"></div>
            </div>

            <!-- ================= PROBLEMS LIST ================= -->
            <div class="problems-list-section">
                <div class="list-controls">
                    <input type="text" id="problemSearch" placeholder="Rechercher un problème..." class="search-input">
                    <select id="difficultyFilter" class="filter-select">
                        <option value="">Toutes les difficultés</option>
                        <option value="easy">Facile</option>
                        <option value="medium">Moyen</option>
                        <option value="hard">Difficile</option>
                    </select>
                </div>

                <div id="problemsTable" class="problems-table panel">
                    <div class="loading-placeholder">Chargement des problèmes...</div>
                </div>
            </div>
        </section>
    </main>

    <script src="../assets/js/api.js"></script>
    <script src="js/admin-access-check.js"></script>
    <script src="js/admin-problems.js"></script>
</body>

</html>
