<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoForge Admin | Détails du Concours</title>
    <meta name="description" content="Consultez et modifiez un concours administrateur.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../apps/web/assets/css/styles.css">
</head>

<body class="admin-page">
    <div class="site-glow glow-a"></div>
    <div class="site-glow glow-b"></div>

    <header class="admin-topbar">
        <div class="container admin-topbar-inner">
            <a class="brand" href="dashboard.html"><span>Algo</span>Forge <span class="badge">Admin</span></a>
            <nav class="admin-nav">
                <a class="admin-nav-link" href="dashboard.html">Tableau de Bord</a>
                <a class="admin-nav-link" href="problems.html">Problèmes</a>
                <a class="admin-nav-link active" href="contests.html">Concours</a>
                <a class="admin-nav-link" href="users.html">Utilisateurs</a>
            </nav>
            <div class="admin-actions">
                <div class="user-info">
                    <span id="adminUsername">Admin</span>
                    <button id="logoutBtn" class="btn btn-ghost btn-sm">Déconnecter</button>
                </div>
            </div>
        </div>
    </header>

    <main class="admin-main">
        <section class="admin-container">
            <div class="admin-header admin-hero">
                <div>
                    <p class="eyebrow">Contest Details</p>
                    <h1 id="editorPageTitle">Détails du Concours</h1>
                    <p>Vérifiez les informations, mettez à jour le planning et ajustez les problèmes associés.</p>
                </div>
                <div class="admin-header-actions">
                    <a href="contests.html" class="btn btn-ghost">← Retour à la liste</a>
                </div>
            </div>

            <div class="admin-workspace">
                <div id="editorInfo" class="panel admin-note">Chargement du concours...</div>

                <div class="problem-form-section panel">
                    <div class="problem-form-header">
                        <div>
                            <p class="eyebrow">Editor</p>
                            <h2>Modifier le Concours</h2>
                        </div>
                    </div>

                    <form id="contestEditorForm" class="problem-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="contestTitle">Titre du Concours *</label>
                                <input type="text" id="contestTitle" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="contestDescription">Description *</label>
                            <textarea id="contestDescription" rows="4" required></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="contestStart">Heure de début *</label>
                                <input type="datetime-local" id="contestStart" required>
                            </div>
                            <div class="form-group">
                                <label for="contestEnd">Heure de fin *</label>
                                <input type="datetime-local" id="contestEnd" required>
                            </div>
                        </div>

                        <hr class="admin-divider">

                        <div class="form-group">
                            <label>Problèmes Associés</label>
                            <div id="problemDefinitions"></div>
                            <button type="button" class="btn btn-ghost btn-sm mt-4" id="addProblemRowBtn">+ Ajouter un Problème</button>
                        </div>

                        <div class="form-actions mt-8">
                            <button type="submit" class="btn btn-primary" id="saveContestBtn">Enregistrer les modifications</button>
                        </div>
                    </form>

                    <div id="formError" class="error-message" style="display: none;"></div>
                    <div id="formSuccess" class="success-message"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="../apps/web/assets/js/api.js"></script>
    <script src="../apps/web/assets/js/contest-mock-data.js"></script>
    <script src="js/admin-access-check.js"></script>
    <script src="js/admin-contest-editor.js"></script>
</body>

</html>
