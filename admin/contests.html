<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoForge Admin | Gestion des Concours</title>
    <meta name="description" content="Gérez les concours de codage sur AlgoForge.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../apps/web/assets/css/styles.css">
</head>

<body class="admin-page">
    <div class="site-glow glow-a"></div>
    <div class="site-glow glow-b"></div>

    <!-- ================= ADMIN NAVBAR ================= -->
    <header class="admin-topbar">
        <div class="container admin-topbar-inner">
            <a class="brand" href="dashboard.html"><span>Algo</span>Forge <span class="badge">Admin</span></a>
            <nav class="admin-nav">
                <a class="admin-nav-link" href="problems.html">Problèmes</a>
                <a class="admin-nav-link active" href="contests.html">Concours</a>
                <a class="admin-nav-link" href="users.html">Utilisateurs</a>
            </nav>
            <div class="admin-actions">
                <a id="userSpaceBtn" class="btn btn-ghost" href="../apps/web/parameters.html">Parametres</a>
                <button id="logoutBtn" class="btn btn-ghost btn-sm">Déconnexion</button>
            </div>
        </div>
    </header>

    <main class="admin-main">
        <section class="admin-container">
            <div class="admin-header admin-hero">
                <div>
                    <p class="eyebrow">Tournament Management</p>
                    <h1>Gestion des Concours</h1>
                    <p>Programmez des tournois, configurez les plages horaires et associez des problèmes aux concours.</p>
                </div>
                <div class="admin-header-actions">
                    <button id="createContestBtn" class="btn btn-primary">+ Nouveau Concours</button>
                </div>
            </div>

            <div class="admin-workspace">
                <!-- ================= CREATE FORM ================= -->
                <div id="createFormSection" class="problem-form-section panel" hidden>
                    <div class="problem-form-header">
                        <div>
                            <p class="eyebrow">Editor</p>
                            <h2 id="formTitle">Créer un Nouveau Concours</h2>
                        </div>
                        <button type="button" class="btn btn-ghost btn-sm" id="cancelFormBtn">Fermer</button>
                    </div>
                    <form id="contestForm" class="problem-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="contestTitle">Titre du Concours *</label>
                                <input type="text" id="contestTitle" placeholder="Ex: Weekly Contest 42" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="contestDescription">Description *</label>
                            <textarea id="contestDescription" placeholder="Décrivez les règles du concours..." required rows="4"></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="contestStart">Heure de début *</label>
                                <input type="datetime-local" id="contestStart" required>
                            </div>
                            <div class="form-group">
                                <label for="contestEnd">Heure de fin *</label>
                                <input type="datetime-local" id="contestEnd" required>
                            </div>
                        </div>

                        <hr class="admin-divider">

                        <div class="form-group">
                            <label>Problèmes Associés</label>
                            <div id="problemDefinitions">
                                <!-- Problem rows will be injected here -->
                            </div>
                            <button type="button" class="btn btn-ghost btn-sm mt-4" id="addProblemRowBtn">+ Ajouter un Problème</button>
                        </div>

                        <div class="form-actions mt-8">
                            <button type="submit" class="btn btn-primary" id="saveContestBtn">Créer le Concours</button>
                        </div>
                    </form>

                    <div id="formError" class="error-message" hidden></div>
                    <div id="formSuccess" class="success-message" hidden></div>
                </div>

                <!-- ================= CONTESTS LIST ================= -->
                <div class="problems-list-section">
                    <div id="contestsTable" class="problems-table panel">
                        <div class="loading-placeholder">Chargement des concours...</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="../apps/web/assets/js/api.js"></script>
    <script src="../apps/web/assets/js/contest-mock-data.js"></script>
    <script src="js/admin-access-check.js"></script>
    <script src="js/admin-contests.js"></script>
</body>

</html>
